# Подключите в http { } nginx.conf (один раз на сервер):
#   include /etc/nginx/conf.d/enterra-limits.conf;
#
# Зоны rate/conn limit — первый рубеж против DDoS до Node.

limit_req_zone $binary_remote_addr zone=enterra_general:16m rate=25r/s;
limit_req_zone $binary_remote_addr zone=enterra_api:16m rate=12r/s;
limit_req_zone $binary_remote_addr zone=enterra_auth:8m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=enterra_conn:16m;
