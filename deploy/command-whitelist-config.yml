# subcommands = ЧЁРНЫЙ СПИСОК (блокирует только перечисленное), см. readme CommandWhitelist
# Сверка с shared/vipCommands.ts
messages:
  prefix: '<#00bfff>КОМАНДЫ <#696969>• '
  command_denied: <#00bfff><b>Enterra <#696969>• <#fffafa>Эта команда недоступна вашей группе
  subcommand_denied: <#00bfff><b>Enterra <#696969>• <#fffafa>Эта подкоманда недоступна вашей группе
  no_permission: <red>У вас нет прав на это действие.
  no_such_subcommand: <red>Подкоманда с таким именем не найдена.
  config_reloaded: <yellow>Конфигурация перезагружена.
  added_to_whitelist: <yellow>Команда <gold>%s <yellow>добавлена для права <gold>%s
  removed_from_whitelist: <yellow>Команда <gold>%s <yellow>удалена для права <gold>%s
  group_doesnt_exist: <red>Группа не существует или произошла ошибка

