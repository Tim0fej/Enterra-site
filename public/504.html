<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#05080f" />
  <title>504 — Сервер не отвечает · Enterra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #05080f;
      color: #e8edf5;
      padding: 24px;
      line-height: 1.55;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 200, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 255, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 35%, black 15%, transparent 100%);
    }
    .shell {
      position: relative;
      width: min(460px, 100%);
      padding: 34px 26px 28px;
      border: 1px solid rgba(248, 81, 73, 0.28);
      border-radius: 18px;
      background: linear-gradient(160deg, rgba(12, 20, 36, 0.96) 0%, rgba(8, 14, 28, 0.98) 100%);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35), 0 0 40px rgba(248, 81, 73, 0.06);
      text-align: center;
    }
    .brand { display: inline-flex; margin-bottom: 18px; opacity: 0.92; }
    .brand img { height: 28px; width: auto; display: block; }
    .code { font-family: "Courier New", monospace; font-size: 3.2rem; font-weight: 700; color: #f85149; margin-bottom: 10px; }
    h1 { font-size: 1.2rem; margin-bottom: 6px; }
    .subtitle { color: #9aa8bc; font-size: 0.92rem; margin-bottom: 14px; }
    .text { color: #9aa8bc; font-size: 0.95rem; margin-bottom: 22px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    a, button { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; padding: 10px 18px; border-radius: 10px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; font: inherit; }
    .primary { background: #00c8ff; color: #05080f; }
    .ghost { background: transparent; color: #00c8ff; border: 1px solid rgba(0, 200, 255, 0.35); }
  </style>
</head>
<body>
  <main class="shell">
    <a class="brand" href="/"><img src="/logo.png" alt="Enterra" /></a>
    <div class="code" aria-hidden="true">504</div>
    <h1>Сервер не отвечает</h1>
    <p class="subtitle">Сайт временно перегружен или на техобслуживании</p>
    <p class="text">Подожди минуту и обнови страницу. Если ошибка повторяется — зайди позже или напиши в поддержку.</p>
    <div class="actions">
      <button type="button" class="primary" onclick="location.reload()">Обновить</button>
      <a class="ghost" href="/support">Поддержка</a>
    </div>
  </main>
</body>
</html>
