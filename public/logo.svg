<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Enterra">
  <defs>
    <linearGradient id="grass-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7a0"/>
      <stop offset="100%" stop-color="#52b788"/>
    </linearGradient>
    <linearGradient id="grass-mid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40916c"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="dirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5e34"/>
      <stop offset="100%" stop-color="#6f4e37"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="#05080f"/>
  <rect x="28" y="72" width="72" height="28" rx="4" fill="url(#dirt)"/>
  <rect x="28" y="54" width="72" height="22" rx="4" fill="url(#grass-mid)"/>
  <rect x="28" y="38" width="72" height="20" rx="4" fill="url(#grass-top)"/>
  <text x="64" y="88" text-anchor="middle" fill="#00c8ff" font-family="monospace" font-size="34" font-weight="700" filter="url(#glow)">E</text>
</svg>
